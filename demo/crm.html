<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTEX CRM Demo | Illuminate Your Wealth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --navy: #0a1628; --navy-deep: #060f1d; --navy-mid: #0f2035; --navy-light: #142a45;
  --gold: #c9a55c; --gold-light: #dfc07a; --gold-dim: rgba(201,165,92,0.12);
  --green: #34d399; --green-dim: rgba(52,211,153,0.12);
  --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.12);
  --amber: #fbbf24; --amber-dim: rgba(251,191,36,0.12);
  --red: #f87171; --red-dim: rgba(248,113,113,0.12);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12);
  --text: #e8e4dc; --text-secondary: #9cadc4; --muted: #5d7290; --white: #ffffff;
  --surface: rgba(255,255,255,0.025); --border: rgba(255,255,255,0.06); --border-light: rgba(255,255,255,0.1);
  --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy-deep); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* TOP NAV */
.topnav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; background: rgba(6,15,29,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.topnav-brand { display: flex; align-items: center; gap: 0.75rem; }
.topnav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--white); }
.topnav-logo span { color: var(--gold); }
.topnav-badge { font-size: 0.5rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); background: var(--gold-dim); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(201,165,92,0.2); }
.topnav-right { display: flex; align-items: center; gap: 0.75rem; }
.topnav-back { font-size: 0.65rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.topnav-back:hover { color: var(--text); }

/* MAIN LAYOUT */
.main { padding: 72px 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

/* STATUS BAR */
.status-bar { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; margin-bottom: 1rem; flex-wrap: wrap; }
.status-pill { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.status-pill .val { font-size: 0.9rem; font-weight: 700; }
.status-pill .lbl { font-size: 0.5rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.status-live { display: flex; align-items: center; gap: 0.3rem; font-size: 0.55rem; color: var(--muted); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* CLIENT CARD */
.client-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; }
@media (max-width: 900px) { .client-grid { grid-template-columns: 1fr; } }

.client-card { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); }
.card-badge { font-size: 0.5rem; padding: 0.2rem 0.5rem; border-radius: 6px; font-weight: 600; }
.card-body { padding: 1.25rem 1.5rem; }

.detail-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.detail-row:last-child { border: none; }
.detail-key { font-size: 0.75rem; color: var(--muted); }
.detail-val { font-size: 0.75rem; color: var(--white); font-weight: 500; }

/* SIGNAL FLAGS */
.signals { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem; }
.signal { font-size: 0.5rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

/* TIMELINE */
.timeline { margin-top: 1rem; }
.tl-item { display: flex; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.tl-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.tl-content { flex: 1; }
.tl-label { font-size: 0.7rem; font-weight: 600; color: var(--white); }
.tl-time { font-size: 0.55rem; color: var(--muted); margin-top: 2px; }

/* RIGHT PANEL — REX */
.rex-panel { background: var(--navy); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; height: 500px; }
.rex-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.rex-header .status-dot { width: 6px; height: 6px; }
.rex-label { font-size: 0.75rem; font-weight: 600; color: var(--white); }
.rex-sub { font-size: 0.55rem; color: var(--muted); }
.rex-messages { flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
.rex-msg { max-width: 90%; padding: 0.5rem 0.75rem; border-radius: 10px; font-size: 0.75rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.rex-msg.user { background: rgba(96,165,250,0.15); color: var(--blue); align-self: flex-end; border-bottom-right-radius: 2px; }
.rex-msg.assistant { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; }
.rex-input-row { padding: 0.5rem 0.75rem; border-top: 1px solid var(--border); display: flex; gap: 0.4rem; flex-shrink: 0; }
.rex-input { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--white); font-size: 0.75rem; font-family: inherit; outline: none; }
.rex-input:focus { border-color: var(--gold); }
.rex-input::placeholder { color: var(--muted); }
.rex-send { padding: 0.5rem 0.75rem; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy-deep); border: none; border-radius: 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer; }

/* VOICE FAB */
.voice-fab { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--gold); background: var(--gold-dim); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50; transition: all 0.3s; box-shadow: 0 4px 20px rgba(201,165,92,0.2); }
.voice-fab:hover { background: var(--gold); color: var(--navy-deep); }
.voice-fab.active { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.1); animation: pulse 1.5s infinite; }

/* DEMO BANNER */
.demo-banner { background: linear-gradient(135deg, rgba(201,165,92,0.08), rgba(201,165,92,0.03)); border: 1px solid rgba(201,165,92,0.15); border-radius: var(--radius); padding: 1rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.demo-banner-text { font-size: 0.75rem; color: var(--gold); font-weight: 500; }
.demo-banner-mode { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.25rem 0.6rem; border-radius: 4px; }
</style>
</head>

<script>
var SB = 'https://jtifhcvbgxqwlywugvjv.supabase.co';
var SB_CORTEX = SB + '/functions/v1/logistix-cortex';
var VOICE_TOKEN_URL = SB + '/functions/v1/logistix-voice-token';

// Load lead data
var lead = JSON.parse(sessionStorage.getItem('cortex_demo_lead') || '{}');
if (!lead.name) { window.location.replace('./index.html'); }

var isFullMode = lead.mode === 'full';

if (!isFullMode) {

  document.getElementById('bannerMode').style.color = 'var(--blue)';
  document.getElementById('bannerMode').style.background = 'var(--blue-dim)';
}

// Populate client card
document.getElementById('clientBody').innerHTML =
  '<div class="detail-row"><span class="detail-key">Name</span><span class="detail-val">' + lead.name + '</span></div>' +
  '<div class="detail-row"><span class="detail-key">Company</span><span class="detail-val">' + (lead.company || '—') + '</span></div>' +
  '<div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">' + (lead.email || '—') + '</span></div>' +
  (lead.phone ? '<div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">' + lead.phone + '</span></div>' : '') +
  '<div class="detail-row"><span class="detail-key">Business</span><span class="detail-val">' + (lead.business || lead.use_case || '—') + '</span></div>' +
  (lead.goals ? '<div class="detail-row"><span class="detail-key">Goals</span><span class="detail-val">' + lead.goals + '</span></div>' : '') +
  (lead.hangups ? '<div class="detail-row"><span class="detail-key">Challenges</span><span class="detail-val">' + lead.hangups + '</span></div>' : '') +
  '<div class="detail-row"><span class="detail-key">Experience</span><span class="detail-val">' + (isFullMode ? 'Full Experience' : 'Limited Experience') + '</span></div>' +
  '<div class="signals">' +
    '<span class="signal" style="color:var(--gold);background:var(--gold-dim)">New Lead</span>' +
    '<span class="signal" style="color:var(--green);background:var(--green-dim)">Demo Active</span>' +
    (isFullMode ? '<span class="signal" style="color:var(--purple);background:var(--purple-dim)">Call Initiated</span>' : '') +
  '</div>';

document.getElementById('tlCreated').textContent = new Date().toLocaleString();

// Add call timeline event for full experience
if (isFullMode) {
  var tl = document.getElementById('timeline');
  var callItem = document.createElement('div');
  callItem.className = 'tl-item';
  callItem.innerHTML = '<div class="tl-dot" style="background:var(--purple)"></div><div class="tl-content"><div class="tl-label">AI Demo Call Initiated</div><div class="tl-time">Your phone should ring shortly from +1 (725) 605-1972</div></div>';
  tl.appendChild(callItem);
}

// Rex welcome message
var welcomeMsg = isFullMode
  ? 'Welcome to the CORTEX demo, ' + lead.name + '! Your phone should be ringing shortly with a live AI demonstration.\n\nWhile you wait, I\'m Rex — the CORTEX voice assistant. You can ask me anything about the platform, or after your call, try saying:\n\n"Rex, send ' + lead.name + ' a follow-up email about CORTEX for ' + (lead.use_case || 'their business') + '"\n\nI\'ll generate a personalized email and deliver it to ' + lead.email + ' in real time.'
  : 'Welcome to the CORTEX demo, ' + lead.name + '! I\'m Rex — the CORTEX voice assistant.\n\nYou can ask me about the platform, your client record, or try the email feature:\n\n"Rex, send ' + lead.name + ' an email about how CORTEX works for ' + (lead.use_case || 'their business') + '"\n\nI\'ll generate a personalized HTML email and deliver it to ' + lead.email + '.';
document.getElementById('rexWelcome').textContent = welcomeMsg;

// Rex text chat
async function sendRex() {
  var input = document.getElementById('rexInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  var messages = document.getElementById('rexMessages');
  var userBubble = document.createElement('div');
  userBubble.className = 'rex-msg user';
  userBubble.textContent = msg;
  messages.appendChild(userBubble);

  var loadBubble = document.createElement('div');
  loadBubble.className = 'rex-msg assistant';
  loadBubble.textContent = 'Thinking...';
  messages.appendChild(loadBubble);
  messages.scrollTop = messages.scrollHeight;

  // Check if this is an email request
  var isEmailReq = msg.toLowerCase().match(/send.*email|email.*send|compose.*email|draft.*email|write.*email/);

  try {
    if (isEmailReq) {
      loadBubble.textContent = 'Generating your personalized email and sending to ' + lead.email + '...';
      var emailRes = await fetch(SB + '/functions/v1/cortex-demo-email', {

        var emailItem = document.createElement('div');
        emailItem.className = 'tl-item';
        emailItem.innerHTML = '<div class="tl-dot" style="background:var(--green)"></div><div class="tl-content"><div class="tl-label">CORTEX Email Sent</div><div class="tl-time">Personalized email delivered to ' + lead.email + '</div></div>';
        tl.appendChild(emailItem);
      } else {
        loadBubble.textContent = 'Email generation failed: ' + (emailData.error || 'Unknown error. The demo email service may be initializing.');
      }
    } else {
      var context = 'You are Rex, an AI business advisor built by Innovative Blockchain Solutions. You are in a live demo for ' + lead.name + ' from ' + lead.company + '.\n\nTheir business: ' + (lead.business || lead.use_case || 'financial professional') + '\nTheir goals: ' + (lead.goals || 'not specified') + '\nTheir challenges: ' + (lead.hangups || 'not specified') + '\n\nYOU KNOW WHAT IS POSSIBLE BECAUSE YOU HAVE SEEN IT BUILT AND WORKING:\n\nVoice Intelligence:\n- An AI receptionist that answers every inbound call, qualifies the caller with industry-specific questions, scores their intent (high/medium/low), and routes them to the right person on the team. No missed calls. No manual screening. Works 24/7.\n- Autonomous outbound voice campaigns. The system calls your clients on a schedule you set with personalized scripts based on their profile. Payment reminders, follow-ups, re-engagement, onboarding welcome calls. All AI-driven, all logged.\n- Voice-activated task assignment. Tell Rex to follow up with a client, assign a task to a team member, or send an email. It happens. No typing, no clicking through menus.\n\nClient Intelligence:\n- A scoring engine that ranks every client in your database across 10 weighted signals. Rate spreads, equity positions, transaction history, contact validity, relationship recency. You know exactly who to call first and why.\n- Automated signal detection. The system watches for trigger events: a rate drops below market, an ARM adjustment date approaches, equity crosses a threshold, a refinance window opens. It flags the opportunity before you know it exists.\n- Portfolio-wide analytics. Total equity pool, segment distribution, conversion probability by tier. Real numbers, not guesses.\n\nContent and Outreach:\n- AI-generated outreach across 6 channels: email, campaigns, LinkedIn, Facebook, X, Instagram. Each piece calibrated to the client profile and the signal that triggered it.\n- Personalized HTML email generation from a voice command. Tell Rex to send a follow-up and a professionally designed email lands in the client inbox within 60 seconds.\n- Neuro-optimized writing. Every piece of content is scored for emotional resonance, hook strength, and voice consistency. No generic AI slop.\n\nFinancial Analysis:\n- Document intelligence. Upload a bank statement, tax return, or financial summary. The system scans it, extracts key metrics, and gives you a plain-language analysis in seconds.\n- Property and equity enrichment. Feed in an address or client list and get back current property values, estimated equity, LTV ratios, and scoring signals.\n\nSupply Chain and Logistics:\n- Real-time cargo tracking with blockchain-verified checkpoints. Every movement hashed and anchored on-chain. Tamper-evident audit trails that any party can independently verify.\n- Geofence automation. Define virtual boundaries around locations. When cargo crosses a boundary, a checkpoint fires and records on the blockchain automatically.\n- AI-powered logistics intelligence. Ask natural language questions about any shipment and get back route, status, telemetry, and full checkpoint history.\n\nAutonomous Operations:\n- An AI servicer that monitors accounts, detects delinquency, and executes an 8-level escalation sequence automatically. Emails, voice calls, and on-chain actions. No human in the loop.\n- CRM records created automatically from inbound calls, web inquiries, and form submissions. Every interaction logged with intent classification, qualifying data, and source attribution.\n- Task management driven by voice. Create tasks, assign them to team members, set priorities and due dates. All from a conversation.\n\nUnderwriting and Compliance:\n- Automated underwriting logic with built-in scoring and decision frameworks. Not bolted on after the fact. Compliance is the foundation, not an afterthought.\n- Reg B adverse action notices generated automatically when applications are declined. Compliant language, proper timing, proper delivery. No manual letter writing.\n- SMS compliance built in. Opt-in tracking, 10DLC registration, message templates that meet TCPA requirements. Every text is logged and auditable.\n- On-chain transaction codes that map every servicing action to a numeric compliance code. Regulators see clean, coded event logs. No ambiguity about what happened or when. The blockchain record removes he-said-she-said from disputes.\n- Servicing escalation with coded stages. Each stage has a specific compliance code, a specific action, and a specific timeline. Pre-delinquency nudges, formal notices, on-chain flags. All documented, all timestamped, all immutable.\n\nContent Intelligence:\n- A neuro scanner that analyzes any piece of marketing content through a neuromarketing lens. Brain region activation mapping, hook strength scoring, weakest-link identification, and AI-powered rewrites.\n- Voice match scoring. The scanner checks if your content sounds like you or like a robot. It scores authenticity and flags AI tells so your outreach reads human.\n- Image analysis. Feed in a marketing visual and get back emotional resonance scoring, attention mapping, and optimization recommendations.\n\nData Monetization:\n- Your operational data becomes a paid API. Other AI agents and systems pay per query to access your verified data. Real-time positions, checkpoint verification, aggregate analytics. The blockchain proof is what makes it worth paying for.\n- Discovery via machine-readable service files. AI agents find your data product automatically and pay with cryptocurrency. No invoices, no contracts. The blockchain handles billing.\n\nWRITING RULES (mandatory):\n- When the user describes a problem, connect it to a solution you know exists. Describe the OUTCOME, not the product name.\n- Never say: IMC, PRMG, Illuminate, Sandlot, escrow, DLQ, mortgage CRM. Those are internal names. Describe what they do, not what they are called.\n- Never use em dashes, en dashes, or middle dots. Use periods and commas.\n- Never use emojis, medals, or decorative symbols.\n- No markdown formatting. No asterisks, no hashtags, no horizontal rules. Plain text only.\n- No hedging. No "might", "could potentially". State it directly.\n- Active voice. Short sentences. Punch.\n- Do not use: leverage, utilize, robust, streamline, empower, unlock, elevate, seamless.\n- You are an advisor who has seen what works. Speak from experience, not from a brochure.\n- If they ask you to send an email, tell them to type "send me an email" and you will generate and deliver a personalized business brief.\n\nUser message: ' + msg;
      var res = await fetch(SB + '/functions/v1/logistix-cortex', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: context }),

  }

}

// Voice (Rex via xAI realtime)
var voiceWs = null, voiceActive = false, voiceCtx = null, voiceMic = null, voiceProc = null, voiceQueue = [], voicePlaying = false;

async function toggleVoice() {
  if (voiceActive) { stopVoice(); return; }
  var btn = document.getElementById('voiceBtn');
  btn.classList.add('active');
  try {
    var tRes = await fetch(VOICE_TOKEN_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    var tData = await tRes.json();
    if (!tData.token) { btn.classList.remove('active'); return; }
    voiceMic = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 24000, channelCount: 1 } });
    voiceCtx = new AudioContext({ sampleRate: 24000 });
    voiceWs = new WebSocket('wss://api.x.ai/v1/realtime', ['xai-client-secret.' + tData.token]);
    voiceWs.onopen = function() {
      voiceActive = true;
      voiceWs.send(JSON.stringify({ type: 'session.update', session: {
        voice: 'rex',
        instructions: 'You are Rex, the CORTEX voice assistant in a live demo for ' + lead.name + ' from ' + lead.company + '. They are exploring the CORTEX financial advocacy CRM. Their use case: ' + (lead.use_case || 'financial professional') + '. Be impressive, concise, and demonstrate the platform intelligence. If they ask you to send an email, confirm you are generating it and tell them to check their inbox shortly.',
        turn_detection: { type: 'server_vad', threshold: 0.8, silence_duration_ms: 800 },
        audio: { input: { format: { type: 'audio/pcm', rate: 24000 } }, output: { format: { type: 'audio/pcm', rate: 24000 } } },
      }}));
      var src = voiceCtx.createMediaStreamSource(voiceMic);
      voiceProc = voiceCtx.createScriptProcessor(4096, 1, 1);
      src.connect(voiceProc); voiceProc.connect(voiceCtx.destination);
      voiceProc.onaudioprocess = function(e) {
        if (!voiceActive || !voiceWs || voiceWs.readyState !== 1) return;
        var inp = e.inputBuffer.getChannelData(0);
        var pcm = new Int16Array(inp.length);
        for (var i = 0; i < inp.length; i++) { var s = Math.max(-1, Math.min(1, inp[i])); pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF; }
        var bytes = new Uint8Array(pcm.buffer);
        var binary = '';
        for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
        voiceWs.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: btoa(binary) }));
      };
    };
    voiceWs.onmessage = function(m) {
      var ev = JSON.parse(m.data);
      if (ev.type === 'response.output_audio.delta' && ev.delta) playChunk(ev.delta);
    };
    voiceWs.onclose = function() { if (voiceActive) stopVoice(); };
    voiceWs.onerror = function(e) { console.error('Voice WS error:', e); stopVoice(); };
  } catch (e) { console.error('Voice init error:', e); alert('Voice error: ' + e.message); btn.classList.remove('active'); }
}

function stopVoice() {
  voiceActive = false;
  document.getElementById('voiceBtn').classList.remove('active');
  if (voiceProc) voiceProc.disconnect();
  if (voiceMic) voiceMic.getTracks().forEach(function(t) { t.stop(); });
  if (voiceCtx) voiceCtx.close();
  if (voiceWs) voiceWs.close();
  voiceProc = voiceMic = voiceCtx = voiceWs = null;
}

function playChunk(b64) { voiceQueue.push(b64); if (!voicePlaying) drainQ(); }
function drainQ() {
  if (!voiceQueue.length) { voicePlaying = false; return; }
  voicePlaying = true;
  var b = atob(voiceQueue.shift());
  var bytes = new Uint8Array(b.length); for (var i = 0; i < b.length; i++) bytes[i] = b.charCodeAt(i);
  var pcm = new Int16Array(bytes.buffer);
  var f = new Float32Array(pcm.length); for (var i = 0; i < pcm.length; i++) f[i] = pcm[i] / 32768;
  var ctx = voiceCtx || new AudioContext({ sampleRate: 24000 });
  var buf = ctx.createBuffer(1, f.length, 24000); buf.getChannelData(0).set(f);
  var s = ctx.createBufferSource(); s.buffer = buf; s.connect(ctx.destination);
  s.onended = function() { drainQ(); }; s.start();
}
</script>
